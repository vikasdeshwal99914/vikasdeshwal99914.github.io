<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.login-box{
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.login-box h2{
  text-align: center;
  margin-bottom: 20px;
}

input{
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

button{
  width: 100%;
  padding: 10px;
  background: #0078d7;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  cursor: pointer;
}

button:hover{
  background: #005fa3;
}

.error{
  margin-top: 10px;
  color: red;
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input
    type="text"
    id="username"
    placeholder="Username"
    autocomplete="username"
  >

  <input
    type="password"
    id="password"
    placeholder="Password"
    autocomplete="current-password"
  >

  <button onclick="login()">Login</button>

  <div class="error" id="error"></div>
</div>

<!-- IMPORTANT: auth.js must NOT contain <script> tags -->
<script src="auth.js"></script>

</body>
</html>

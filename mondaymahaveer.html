<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Customer Database</title>

<style>


body{
  font-family: Arial;
  background: linear-gradient(120deg,#a1c4fd,#c2e9fb);
  margin:0;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  margin-bottom:20px;
}
.customer{
  background:#f3f6ff;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}
button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#0d47a1;
  color:white;
  cursor:pointer;
  margin-top:5px;
}
button:hover{background:#002171}
input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
pre{
  background:black;
  color:#00ff00;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>



<div class="container">

<div class="card">
<h2>Customer List (Mahaveer)</h2>

<input id="search" placeholder="🔍 Search by name, mobile or address..." onkeyup="searchCustomers()">

<div id="list"></div>
</div>


</div>

<script>

// ⭐⭐⭐ DEVELOPER ADDS CUSTOMERS HERE ⭐⭐⭐
// Format: [Name, Mobile, Address, Latitude, Longitude]
let customersDB = [
  ["1 Rahul Sharma","9876543210","Delhi",28.7041,77.1025],
  ["2 Amit Verma","9123456780","Mumbai",19.0760,72.8777],
  ["3 Priya Singh","9988776655","Jaipur",26.9124,75.7873],
  ["4 Neha Gupta","9090909090","Lucknow",26.8467,80.9462],
  ["5 Rohit Kumar","9898989898","Chandigarh",30.7333,76.7794],
  ["6 Ram Kumar","9898989898","Chandigarh",30.7333,76.7794],
  ["7 Ravi Kumar","9898989898","Chandigarh",30.7333,76.7794],
  ["8 Ravish Kumar","9898989898","Chandigarh",30.7333,76.7794],
  ["9 Gaurav kumar","9898989898","Chandigarh",30.7333,76.7794],
  ["vikas deshwal","6766888687","neha cosmetic wali gali",28.861696,77.16460450000001],
];

function displayCustomers(arr){
  let list=document.getElementById("list");
  list.innerHTML="";

  arr.forEach((c)=>{
    list.innerHTML+=`
    <div class="customer">
      <b>${c[0]}</b><br>
      📞 ${c[1]}<br>
      📍 ${c[2]}<br>
      Lat: ${c[3]} | Long: ${c[4]}<br>
      <button onclick="track(${c[3]},${c[4]})">Track Location</button>
    </div>`;
  });

  document.getElementById("database").textContent =
      JSON.stringify(customersDB, null, 2);
}

function searchCustomers(){
  let text=document.getElementById("search").value.toLowerCase();

  let filtered = customersDB.filter(c =>
      c[0].toLowerCase().includes(text) ||
      c[1].includes(text) ||
      c[2].toLowerCase().includes(text)
  );

  displayCustomers(filtered);
}

function track(lat,long){
  window.open(`https://www.google.com/maps?q=${lat},${long}`);
}

// load all initially
displayCustomers(customersDB);

</script>
</body>
</html>

}

/* MODAL */

.modal img{width:350px;border-radius:10px}
.close{position:absolute;top:20px;right:30px;font-size:30px;cursor:pointer}

/* FOOTER */
footer{text-align:center;padding:20px;background:#000;margin-top:40px}

margin-right:20px;
width:220px;
outline:none;

<script>

    window.onclick = function(event){
let modal = document.getElementById("modal");
if(event.target === modal){
modal.style.display = "none";
}
}



const products=[
{name:"Whey Protein",price:2000,img:"https://images.unsplash.com/photo-1594737625785-cbdb1b70f18d"},
{name:"Mass Gainer",price:2500,img:"https://images.unsplash.com/photo-1605296867424-35fc25c9212a"},
{name:"Creatine",price:1200,img:"https://images.unsplash.com/photo-1583454110551-21f2fa2afe61"},
{name:"Multivitamins",price:900,img:"https://images.unsplash.com/photo-1580281657527-47f249e8f4df"},
{name:"Pre Workout",price:1500,img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
{name:"BCAA",price:1400,img:"https://images.unsplash.com/photo-1599058917212-d750089bc07e"},
{name:"Fish Oil",price:800,img:"https://images.unsplash.com/photo-1584362917165-526a968579e8"},
{name:"Peanut Butter",price:500,img:"https://images.unsplash.com/photo-1585238342024-78d387f4a707"},
{name:"Oats",price:350,img:"https://images.unsplash.com/photo-1505575972945-28047c4c15b2"},
{name:"Protein Bars",price:700,img:"https://images.unsplash.com/photo-1615485737651-fc3a7c7a6f52"},
{name:"Glutamine",price:1100,img:"https://images.unsplash.com/photo-1592928302636-c83cf1a1f5f2"},
{name:"Shaker Bottle",price:300,img:"https://images.unsplash.com/photo-1612538498456-e861df91d4d0"}
];

let cart=[];
function displayProducts(filter=""){
let grid=document.getElementById("productGrid");
grid.innerHTML="";

let filteredProducts = products.filter(p =>
p.name.toLowerCase().includes(filter.toLowerCase())
);

if(filteredProducts.length===0){
grid.innerHTML="<h2>No Product Found</h2>";
return;
}

filteredProducts.forEach((p,i)=>{
let index = products.findIndex(prod => prod.name === p.name);

grid.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick="openModal(${index})">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart(${index})">Add to Cart</button>
</div>`;
});
}
displayProducts();
function openModal(index){
let product = products[index];

document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src = product.img;
document.getElementById("modalName").innerText = product.name;
document.getElementById("modalPrice").innerText = "Price: ₹" + product.price;
}
function closeModal(){document.getElementById("modal").style.display="none"}

function addToCart(i){
let item=cart.find(p=>p.name===products[i].name);
if(item) item.qty++;
else cart.push({...products[i],qty:1});
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
let total=0; list.innerHTML="";
cart.forEach((p,index)=>{
total+=p.price*p.qty;
list.innerHTML+=`<div class="cart-item">
${p.name} x${p.qty} - ₹${p.price*p.qty}
<button onclick="removeItem(${index})">Remove</button>
</div>`;
});
document.getElementById("total").innerText="Total: ₹"+total;
document.getElementById("count").innerText=cart.length;
}

function removeItem(i){cart.splice(i,1);updateCart();}

function orderWhatsApp(){
if(cart.length===0){alert("Cart is empty");return;}
let msg="Hello, I want to order:%0A%0A";
let total=0;
cart.forEach(p=>{
msg+=`${p.name} x${p.qty} - ₹${p.price*p.qty}%0A`;
total+=p.price*p.qty;
});
msg+=`%0ATotal Amount: ₹${total}`;
window.open(`https://wa.me/918607794578?text=${msg}`,"_blank");
}

    // 🔍 SEARCH FUNCTION (FIX)
document.getElementById("searchBar").addEventListener("keyup", function(){
displayProducts(this.value);
});
</script>

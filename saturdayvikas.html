function displayCustomers(arr){
  let list=document.getElementById("list");
  list.innerHTML="";

  arr.forEach((c)=>{
    list.innerHTML+=`
    <div class="customer">
      <b>${c[0]}</b><br>
      📞 ${c[1]}<br>
      📍 ${c[2]}<br>
      Lat: ${c[3]} | Long: ${c[4]}<br>
      <button onclick="track(${c[3]},${c[4]})">Track Location</button>
    </div>`;
  });

  document.getElementById("database").textContent =
      JSON.stringify(customersDB, null, 2);
}

function searchCustomers(){
  let text=document.getElementById("search").value.toLowerCase();

  let filtered = customersDB.filter(c =>
      c[0].toLowerCase().includes(text) ||
      c[1].includes(text) ||
      c[2].toLowerCase().includes(text)
  );

  displayCustomers(filtered);
}

function track(lat,long){
  window.open(`https://www.google.com/maps?q=${lat},${long}`);
}

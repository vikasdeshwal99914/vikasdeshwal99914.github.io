<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyBasket Grocery</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f5fff6}

/* NAVBAR */
nav{
  background:#1faa59;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;top:0
}
nav h2{font-size:24px}
nav ul{display:flex;gap:20px;list-style:none}
nav a{color:white;text-decoration:none;font-weight:bold}
.cart-count{background:red;border-radius:50%;padding:3px 7px;font-size:12px}

/* HERO */
.hero{
  height:70vh;
  background:url("https://images.unsplash.com/photo-1542838132-92c53300491e") center/cover;
  display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;text-align:center
}
.hero h1{font-size:42px;text-shadow:0 0 10px black}
.hero button{
  margin-top:20px;padding:15px 30px;background:#ff9800;border:none;color:white;font-size:18px;border-radius:8px;cursor:pointer
}

/* PRODUCTS */
.products{padding:40px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:30px}
.card{
  background:white;padding:15px;border-radius:10px;
  box-shadow:0 0 10px #ccc
}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}
.card button{
  margin-top:10px;
  background:#1faa59;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}

/* CART */
.cart{
  position:fixed;right:0;top:0;background:white;width:320px;height:100%;
  box-shadow:-3px 0 10px #999;padding:20px;display:none;overflow:auto
}

/* FORM */
.form{padding:40px;background:#e8f5e9}
input,textarea,select{
  width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc
}
.btn{background:#1faa59;color:white;padding:12px;border:none;border-radius:5px;width:100%;font-size:16px}

/* FOOTER */
footer{background:#1faa59;color:white;text-align:center;padding:20px}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<ul>
<li><a href="#products">Products</a></li>
<li><a href="#checkout">Checkout</a></li>
    <li><a href="#contact">Contact</a></li>
<li><a href="#" onclick="toggleCart()">Cart <span id="count" class="cart-count">0</span></a></li>
</ul>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Fresh Groceries Delivered in 30 Minutes</h1>
<button onclick="document.getElementById('products').scrollIntoView()">Shop Now</button>
</section>

<!-- PRODUCTS -->
<section id="products" class="products">
<h2>Our Products</h2>
<div class="grid" id="productGrid"></div>
</section>

<!-- CART -->
<div class="cart" id="cartBox">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total ₹<span id="total">0</span></h3>
<button class="btn" onclick="scrollCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<section id="checkout" class="form">

<h2>Your Selected Items</h2>
<div id="checkoutItems" style="background:white;padding:15px;border-radius:10px;margin-bottom:20px"></div>

<h2>Delivery Details</h2>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Mobile Number">
<textarea id="address" placeholder="Address"></textarea>
<input id="pincode" placeholder="Pincode">
<select id="payment">
<option>Cash on Delivery</option>
<option>UPI</option>
</select>

<button class="btn" onclick="sendWhatsApp()">Send Order on WhatsApp</button>
<br><br>
<button class="btn" onclick="payUPI()">Pay Now (UPI)</button>
</section>

<!-- CONTACT SECTION -->
<section id="contact" style="padding:40px;text-align:center;background:#ffffff">
<h2>Contact Us</h2>
<p>We are always ready to help you 😊</p>

<div style="margin-top:25px">

<a href="https://wa.me/918607794578" target="_blank">
<button style="background:#25D366;color:white;padding:12px 25px;border:none;border-radius:6px;margin:10px;cursor:pointer;font-size:16px">
📱 WhatsApp Us
</button>
</a>

<a href="https://instagram.com/YOUR_INSTAGRAM" target="_blank">
<button style="background:#E1306C;color:white;padding:12px 25px;border:none;border-radius:6px;margin:10px;cursor:pointer;font-size:16px">
📸 Instagram
</button>
</a>

<a href="https://facebook.com/YOUR_FACEBOOK" target="_blank">
<button style="background:#1877F2;color:white;padding:12px 25px;border:none;border-radius:6px;margin:10px;cursor:pointer;font-size:16px">
👍 Facebook
</button>
</a>

</div>
</section>
<footer>
© DailyBasket Grocery Delivery
</footer>

<!-- PRODUCT POPUP -->

<div id="popup" onclick="outsideClick(event)"
style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:999">

  <div id="popupBox"
  style="background:white;width:90%;max-width:500px;border-radius:10px;padding:20px;position:relative">

    <span onclick="closePopup()"
    style="position:absolute;right:15px;top:10px;font-size:22px;cursor:pointer">✖</span>

    <img id="popImg" style="width:100%;height:220px;object-fit:cover;border-radius:10px">

    <h2 id="popName"></h2>
    <h3 id="popPrice"></h3>
    <p id="popDesc"></p>

    <button class="btn" id="popBtn">Add to Cart</button>

  </div>
</div><script>
let products=[
{name:"Atta 5kg",price:260,img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec",desc:"Fresh chakki atta perfect for soft rotis."},
{name:"Rice 5kg",price:520,img:"https://images.unsplash.com/photo-1586201375761-83865001e31c",desc:"Premium basmati rice long grain."},
{name:"Sugar 1kg",price:45,img:"https://images.unsplash.com/photo-1587731556938-38755b4803a6",desc:"Refined sulphur free sugar."},
{name:"Salt 1kg",price:20,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d",desc:"Iodized healthy salt."},
{name:"Mustard Oil",price:170,img:"https://images.unsplash.com/photo-1615485290382-441e4d049cb5",desc:"Pure cold pressed mustard oil."},
{name:"Desi Ghee",price:650,img:"https://images.unsplash.com/photo-1604908811893-0a8e33e32e1e",desc:"Rich aroma cow ghee."},
{name:"Toor Dal",price:140,img:"https://images.unsplash.com/photo-1615485737651-5a7a9a4a26ac",desc:"Protein rich arhar dal."},
{name:"Besan",price:90,img:"https://images.unsplash.com/photo-1615485500704-8e9909b3c735",desc:"Fine gram flour for snacks."},
{name:"Broom",price:80,img:"https://images.unsplash.com/photo-1581578731548-c64695cc6952",desc:"Strong long lasting broom."},
{name:"Pocha Mop",price:120,img:"https://images.unsplash.com/photo-1595433562696-84c3b1f5b5a5",desc:"Super absorbent floor mop."},
{name:"Dishwash Liquid",price:110,img:"https://images.unsplash.com/photo-1581579185169-25c62a36e57b",desc:"Removes grease instantly."},
{name:"Surf 1kg",price:130,img:"https://images.unsplash.com/photo-1626808642875-0aa545482dfb",desc:"Powerful detergent powder."}
]
let cart=[]
function loadProducts(){
let grid=document.getElementById("productGrid")
products.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick="openPopup(${i})" style="cursor:pointer">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addCart(${i})">Add to Cart</button>
</div>`
})
}
loadProducts()

function addCart(i){
cart.push(products[i])
updateCart()
}
function updateCart(){
document.getElementById("count").innerText=cart.length

let items=""
let checkoutItems=""
let total=0

cart.forEach((p,index)=>{
  items+=`<p>${p.name} - ₹${p.price}</p>`

  checkoutItems+=`
  <div style="display:flex;justify-content:space-between;margin:8px 0">
    <span>${p.name} - ₹${p.price}</span>
    <button onclick="removeItem(${index})" style="background:red;color:white;border:none;padding:3px 8px;border-radius:4px;cursor:pointer">X</button>
  </div>`

  total+=p.price
})

document.getElementById("cartItems").innerHTML=items
document.getElementById("checkoutItems").innerHTML=checkoutItems
document.getElementById("total").innerText=total
}

function removeItem(index){
cart.splice(index,1)
updateCart()
}

function toggleCart(){
let c=document.getElementById("cartBox")
c.style.display=c.style.display=="block"?"none":"block"
}

function scrollCheckout(){
document.getElementById("checkout").scrollIntoView()
}

function getOrderText(){
let txt="*New Grocery Order*%0A"
cart.forEach(p=>txt+=p.name+" - ₹"+p.price+"%0A")
txt+="Total: ₹"+document.getElementById("total").innerText+"%0A"
txt+="Name: "+document.getElementById("name").value+"%0A"
txt+="Phone: "+document.getElementById("phone").value+"%0A"
txt+="Address: "+document.getElementById("address").value+"%0A"
txt+="Pincode: "+document.getElementById("pincode").value
return txt
}

function sendWhatsApp(){
let url="https://wa.me/918607794578?text="+getOrderText()
window.open(url)
}

function payUPI(){

let amount = document.getElementById("total").innerText

if(amount == 0){
  alert("Cart is empty!")
  return
}

let upiID = "8607794578@ybl"   // 👈 CHANGE THIS
let name = "DailyBasket Grocery"

// Proper UPI payment link
let upiLink = `upi://pay?pa=${upiID}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=${encodeURIComponent("Grocery Order Payment")}`

// Open payment apps
window.location.href = upiLink

}

    function openPopup(i){
document.getElementById("popup").style.display="flex"
document.getElementById("popImg").src=products[i].img
document.getElementById("popName").innerText=products[i].name
document.getElementById("popPrice").innerText="Price ₹"+products[i].price
document.getElementById("popDesc").innerText=products[i].desc
document.getElementById("popBtn").onclick=function(){addCart(i)}
}

function closePopup(){
document.getElementById("popup").style.display="none"
}
    function outsideClick(event){
  if(event.target.id === "popup"){
    closePopup()
  }
}
</script>

</body>
</html>

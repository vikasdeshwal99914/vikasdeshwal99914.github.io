<head>
<meta charset="UTF-8">

<title>Delivery Dashboard - Vikas Deshwal Trading Company</title>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; }

  header {
    background: #0078d7;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .container {
    max-width: 1000px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;

  }

  input#search {
    width: 100%;
    max-width: 400px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th, td {
    padding: 15px;
    text-align: left;
    border-bottom: 1px solid #eee;
  }

  th {
    background: #0078d7;
    color: white;
    font-weight: 500;
    text-transform: uppercase;
    font-size: 13px;
  }

  tr:hover { background-color: #f9f9f9; }

  button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
  }

  .map-btn {
    background: #28a745;
    color: white;
  }

  .map-btn:hover { background: #218838; }

  .logout-btn {
    background: #dc3545;
    color: white;
  }

  .logout-btn:hover { background: #c82333; }

  .badge {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    background: #e9ecef;
    color: #495057;
  }


    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial, sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#0072ff,#00e0ff);
  display:flex;
  justify-content:center;
  align-items:center;
}

.links-box{
  background:white;
  padding:40px 30px;
  border-radius:20px;
  width:90%;
  max-width:420px;
  box-shadow:0 15px 40px rgba(0,0,0,.25);
  display:flex;
  flex-direction:column;
  gap:18px;
  text-align:center;
}

h1{
  margin-bottom:10px;
  letter-spacing:3px;
  color:#0072ff;
}

.link-btn{
  text-decoration:none;
  padding:16px;
  border-radius:30px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  color:white;
  background:linear-gradient(45deg,#0072ff,#00c6ff);
  transition:.35s;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.link-btn:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 25px rgba(0,0,0,.35);
}

@media(max-width:500px){
  .links-box{padding:30px 20px}
  .link-btn{font-size:16px}
}
</style>
</head>
<body>


<div class="links-box">

<script src="auth.js"></script>

<script>
  // 1. SECURITY CHECK: Redirect to login if no session exists
  const role = sessionStorage.getItem("userRole");
  const username = sessionStorage.getItem("username");

  if (!role) {
    window.location.href = "index.html";
  }

  // Display the logged-in username
  document.getElementById("userBadge").innerText = `User: ${username}`;

  // 2. DATA: Your delivery locations
  const LOCATIONS = [
    { name: "Neha Traders", city: "Delhi", area: "Connaught Place", contact: "9876543210", map: "https://goo.gl/maps/example1" },
    { name: "Client B", city: "Mumbai", area: "Bandra", contact: "9876543211", map: "https://goo.gl/maps/example2" },
    { name: "Global Exports", city: "Delhi", area: "Okhla", contact: "9999888877", map: "https://goo.gl/maps/example3" },
    { name: "South Logistics", city: "Chennai", area: "Adyar", contact: "9123456789", map: "https://goo.gl/maps/example4" }
  ];

  // 3. UI LOGIC: Hide Contact column if the user is not an admin
  const isAdmin = (role === "admin");
  if (!isAdmin) {
    document.getElementById("contactHeader").style.display = "none";
  }

  const tableBody = document.getElementById("tableBody");

  // 4. RENDER FUNCTION
  function render(data) {
    tableBody.innerHTML = "";

    data.forEach(item => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td><strong>${item.name}</strong></td>
        <td>${item.city}</td>
        <td>${item.area}</td>
        ${isAdmin ? `<td>${item.contact}</td>` : ""}
        <td>
          <button class="map-btn" onclick="window.open('${item.map}', '_blank')">
            View Map
          </button>
        </td>
      `;

      tableBody.appendChild(row);
    });
  }

  // Initial render
  render(LOCATIONS);

  // 5. SEARCH LOGIC
  document.getElementById("search").addEventListener("input", e => {
    const term = e.target.value.toLowerCase();
    const filtered = LOCATIONS.filter(item =>
      item.name.toLowerCase().includes(term) ||
      item.city.toLowerCase().includes(term) ||
      item.area.toLowerCase().includes(term)
    );
    render(filtered);
  });
</script>

</body>
